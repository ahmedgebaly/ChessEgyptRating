<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Egypt Rating</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --glass-bg:      rgba(255,255,255,0.07);
      --glass-border:  rgba(255,255,255,0.15);
      --glass-shadow:  rgba(0,0,0,0.4);
      --accent:        #3b82f6;
      --accent-glow:   rgba(59,130,246,0.4);
      --gold:          #f59e0b;
      --silver:        #94a3b8;
      --bronze:        #b45309;
      --green:         #22c55e;
      --red:           #ef4444;
      --text:          rgba(255,255,255,0.92);
      --text-muted:    rgba(255,255,255,0.45);
      --radius:        16px;
      --radius-sm:     10px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      background: #0a0f1e;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(59,130,246,0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(16,185,129,0.08) 0%, transparent 60%);
      color: var(--text);
      padding: 24px 16px 48px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Glass Mixin ── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border: 1px solid var(--glass-border);
      box-shadow: 0 8px 32px var(--glass-shadow), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: clamp(1.6rem, 5vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 300;
    }

    /* ── Input Card ── */
    .input-card {
      max-width: 600px;
      margin: 0 auto 28px;
      border-radius: var(--radius);
      padding: 20px;
    }
    .input-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .input-field {
      flex: 1;
      min-width: 150px;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    /* Chrome number arrows hide */
    .input-field::-webkit-outer-spin-button,
    .input-field::-webkit-inner-spin-button { -webkit-appearance: none; }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.9rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }

    .btn-green {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      box-shadow: 0 4px 15px rgba(34,197,94,0.35);
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
    }
    .btn-green:hover { box-shadow: 0 6px 20px rgba(34,197,94,0.5); }

    .btn-blue-sm {
      background: rgba(59,130,246,0.2);
      color: #93c5fd;
      border: 1px solid rgba(59,130,246,0.3);
      padding: 5px 12px;
      font-size: 0.8rem;
      border-radius: 6px;
    }
    .btn-blue-sm:hover { background: rgba(59,130,246,0.35); }

    .btn-red-sm {
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.25);
      padding: 5px 10px;
      font-size: 0.85rem;
      border-radius: 6px;
    }
    .btn-red-sm:hover { background: rgba(239,68,68,0.3); }

    .btn-average {
      background: rgba(147,51,234,0.2);
      color: #e9d5ff;
      border: 1px solid rgba(147,51,234,0.35);
      padding: 5px 12px;
      font-size: 0.78rem;
      border-radius: 6px;
    }
    .btn-average:hover { background: rgba(147,51,234,0.35); }

    /* ── Table Section ── */
    .table-section {
      max-width: 1200px;
      margin: 0 auto;
      border-radius: var(--radius);
      padding: 20px;
      overflow-x: auto;
    }
    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .table-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .player-count {
      background: rgba(59,130,246,0.2);
      color: #93c5fd;
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    table { width: 100%; border-collapse: collapse; min-width: 640px; }
    thead th {
      padding: 10px 12px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-align: center;
      border-bottom: 1px solid var(--glass-border);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background 0.15s;
      animation: fadeUp 0.3s ease;
    }
    tbody tr:hover { background: rgba(255,255,255,0.04); }
    tbody tr:last-child { border-bottom: none; }
    td {
      padding: 12px;
      font-size: 0.85rem;
      text-align: center;
      vertical-align: middle;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .rank-cell { font-size: 1.1rem; }
    .name-cell { text-align: right; font-weight: 500; }

    .rating-val { font-weight: 600; }
    .rating-muted { color: var(--text-muted); font-size: 0.8rem; }

    .score-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    /* Medal colors */
    .gold-text   { color: #fbbf24; }
    .silver-text { color: #94a3b8; }
    .bronze-text { color: #cd7c2f; }

    .score-gold   { background: rgba(251,191,36,0.15);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .score-silver { background: rgba(148,163,184,0.15); color: #cbd5e1; border: 1px solid rgba(148,163,184,0.3); }
    .score-bronze { background: rgba(205,124,47,0.15);  color: #cd7c2f; border: 1px solid rgba(205,124,47,0.3); }
    .score-normal { background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.1); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; font-weight: 300; }

    .avg-inputs {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(110px, 1fr));
      margin: 12px 0;
    }
    .avg-input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .avg-input-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .avg-input {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 8px 10px;
      font-size: 0.86rem;
      outline: none;
    }
    .avg-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }
    .avg-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
      margin-bottom: 8px;
    }
    .avg-label-value {
      color: #c4b5fd;
      font-weight: 600;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,0.55);
      backdrop-filter: blur(3px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 40;
    }
    .modal-backdrop.active { display: flex; }
    .modal {
      width: 100%;
      max-width: 460px;
      border-radius: var(--radius);
      padding: 16px;
    }
    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .modal-subtitle {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 6px;
    }
    .btn-outline {
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border: 1px solid var(--glass-border);
    }
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      border: 1px solid rgba(59,130,246,0.45);
    }

    .mini-footer {
      margin-top: 28px;
      padding-top: 10px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.2px;
      opacity: 0.9;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      body { padding: 16px 12px 40px; }
      .input-row { flex-direction: column; }
      .input-field { min-width: 100%; }
      .table-section { padding: 14px 10px; }
      .avg-inputs { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <h1>♟ Chess Egypt Rating</h1>
  <p>Manual Player Rankings</p>
</header>

<!-- Input Card -->
<div class="input-card glass">
  <div class="input-label">➕ Add New Player</div>
  <div class="input-row">
    <input id="name" class="input-field" placeholder="اسم اللاعب">
    <input id="rating" class="input-field" type="number" placeholder="FIDE Rating">
    <input id="rank" class="input-field" type="number" placeholder="African Rank">
  </div>
  <div class="avg-inputs">
    <div class="avg-input-group">
      <label class="avg-input-label" for="avg-current-rate">Current Rate</label>
      <input id="avg-current-rate" class="avg-input" type="text" inputmode="numeric">
    </div>
    <div class="avg-input-group">
      <label class="avg-input-label" for="avg-previous-1">Previous 1</label>
      <input id="avg-previous-1" class="avg-input" type="text" inputmode="numeric">
    </div>
    <div class="avg-input-group">
      <label class="avg-input-label" for="avg-previous-2">Previous 2</label>
      <input id="avg-previous-2" class="avg-input" type="text" inputmode="numeric">
    </div>
  </div>
  <button class="btn btn-green" onclick="addPlayer()">إضافة لاعب</button>
</div>

<!-- Table -->
<div class="table-section glass">
  <div class="table-header">
    <span class="table-title">🏆 Live Rankings</span>
    <div style="display:flex;gap:8px;align-items:center;">
      <span class="player-count" id="count">0 Players</span>
      <button class="btn btn-red-sm" onclick="removeAllPlayers()">Remove All Players</button>
    </div>
  </div>
  <div id="table-wrap">
    <div class="empty-state">
      <div class="icon">♟</div>
      <p>Add players manually to see the ranking</p>
    </div>
  </div>
</div>

<script>
let players = [];
let averagePlayerId = null;

function calcScore(p) {
  return p.rating + p.bonus + (1000 - p.rank);
}

function sanitizeIntegerText(value) {
  return String(value ?? "").replace(/[^\d]/g, "");
}

function parseIntegerOrNull(value) {
  const normalized = sanitizeIntegerText(value);
  if (!normalized) return null;
  const n = Number(normalized);
  return Number.isFinite(n) ? n : null;
}

function computeAverage(currentRate, previous1, previous2) {
  const values = [currentRate, previous1, previous2].filter(v => Number.isFinite(v));
  if (values.length === 0) return null;
  return Math.round(values.reduce((sum, item) => sum + item, 0) / values.length);
}

function formatAverageLabel(value) {
  return value == null ? "—" : String(value);
}

function scoreClass(i) {
  return i === 0 ? 'score-gold' : i === 1 ? 'score-silver' : i === 2 ? 'score-bronze' : 'score-normal';
}

function textClass(i) {
  return i === 0 ? 'gold-text' : i === 1 ? 'silver-text' : i === 2 ? 'bronze-text' : '';
}

function render() {
  players.sort((a, b) => calcScore(b) - calcScore(a));
  document.getElementById("count").textContent = `${players.length} Player${players.length !== 1 ? 's' : ''}`;

  const wrap = document.getElementById("table-wrap");

  if (players.length === 0) {
    wrap.innerHTML = `<div class="empty-state">
      <div class="icon">♟</div>
      <p>Add players manually to see the ranking</p>
    </div>`;
    return;
  }

  let rows = players.map((p, i) => {
    const medal  = ['🥇','🥈','🥉'][i] ?? `<span style="color:var(--text-muted)">${i+1}</span>`;
    const cls    = textClass(i);
    const sCls   = scoreClass(i);
    const rating = val => val != null
      ? `<span class="rating-val ${cls}">${val}</span>`
      : `<span class="rating-muted">—</span>`;

    return `<tr>
      <td class="rank-cell">${medal}</td>
      <td class="name-cell">${p.name}</td>
      <td>${rating(p.rating)}</td>
      <td style="color:var(--text-muted);font-size:0.82rem">${p.rank ?? '—'}</td>
      <td><button class="btn btn-average" onclick="openAveragePopup(${p.id})">${formatAverageLabel(p.average)}</button></td>
      <td style="color:#86efac;font-weight:600">${p.bonus > 0 ? '+'+p.bonus : p.bonus}</td>
      <td><span class="score-pill ${sCls}">${calcScore(p)}</span></td>
      <td><button class="btn btn-blue-sm" onclick="addBonus(${p.id})">+10</button></td>
      <td><button class="btn btn-red-sm"  onclick="deletePlayer(${p.id})">🗑</button></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table>
    <thead>
      <tr>
        <th>#</th>
        <th style="text-align:right">الاسم</th>
        <th>Rating</th>
        <th>African Rank</th>
        <th>Average</th>
        <th>Bonus</th>
        <th>Final Score</th>
        <th>+Bonus</th>
        <th>حذف</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function addPlayer() {
  const name = document.getElementById("name").value.trim();
  const rating = +document.getElementById("rating").value;
  const rank = +document.getElementById("rank").value;
  const currentRateInput = parseIntegerOrNull(document.getElementById("avg-current-rate").value);
  const previous1Input = parseIntegerOrNull(document.getElementById("avg-previous-1").value);
  const previous2Input = parseIntegerOrNull(document.getElementById("avg-previous-2").value);
  const currentRate = currentRateInput ?? rating;
  const average = computeAverage(currentRate, previous1Input, previous2Input);

  if (!name) return alert("ادخل اسم اللاعب");
  if (!rating) return alert("ادخل الـ FIDE Rating");
  if (!rank) return alert("ادخل الـ African Rank");

  players.push({
    id: Date.now(),
    name,
    rating,
    rank,
    bonus: 0,
    currentRate,
    previous1: previous1Input,
    previous2: previous2Input,
    average
  });

  document.getElementById("name").value = "";
  document.getElementById("rating").value = "";
  document.getElementById("rank").value = "";
  document.getElementById("avg-current-rate").value = "";
  document.getElementById("avg-previous-1").value = "";
  document.getElementById("avg-previous-2").value = "";

  render();
}

function addBonus(id) {
  const p = players.find(p => p.id === id);
  if (p) p.bonus += 10;
  render();
}

function syncAverageModalPreview() {
  const c = document.getElementById("modal-current-rate");
  const p1 = document.getElementById("modal-previous-1");
  const p2 = document.getElementById("modal-previous-2");
  const out = document.getElementById("modal-average-value");
  if (!c || !p1 || !p2 || !out) return;

  c.value = sanitizeIntegerText(c.value);
  p1.value = sanitizeIntegerText(p1.value);
  p2.value = sanitizeIntegerText(p2.value);

  const avg = computeAverage(
    parseIntegerOrNull(c.value),
    parseIntegerOrNull(p1.value),
    parseIntegerOrNull(p2.value)
  );
  out.textContent = formatAverageLabel(avg);
}

function openAveragePopup(id) {
  averagePlayerId = id;
  const p = players.find(player => player.id === id);
  if (!p) return;

  document.getElementById("average-player-name").textContent = p.name || "";
  document.getElementById("modal-current-rate").value = p.currentRate ?? p.rating ?? "";
  document.getElementById("modal-previous-1").value = p.previous1 ?? "";
  document.getElementById("modal-previous-2").value = p.previous2 ?? "";
  document.getElementById("average-modal-backdrop").classList.add("active");
  syncAverageModalPreview();
}

function closeAveragePopup() {
  averagePlayerId = null;
  document.getElementById("average-modal-backdrop").classList.remove("active");
}

function saveAverageFromPopup() {
  if (averagePlayerId == null) return;
  const p = players.find(player => player.id === averagePlayerId);
  if (!p) return;

  const c = document.getElementById("modal-current-rate");
  const p1 = document.getElementById("modal-previous-1");
  const p2 = document.getElementById("modal-previous-2");
  if (!c || !p1 || !p2) return;

  p.currentRate = parseIntegerOrNull(c.value);
  p.previous1 = parseIntegerOrNull(p1.value);
  p.previous2 = parseIntegerOrNull(p2.value);
  p.average = computeAverage(p.currentRate, p.previous1, p.previous2);

  closeAveragePopup();
  render();
}

function deletePlayer(id) {
  const shouldDelete = confirm("Are you sure you want to delete this player?");
  if (!shouldDelete) return;
  players = players.filter(p => p.id !== id);
  render();
}

function removeAllPlayers() {
  if (players.length === 0) return;
  const shouldDeleteAll = confirm("Are you sure you want to remove all players?");
  if (!shouldDeleteAll) return;
  players = [];
  render();
}

render();
</script>

<footer class="mini-footer">Powered by Zeyad Khalifa & Ahmed El Gebaly</footer>

<div id="average-modal-backdrop" class="modal-backdrop">
  <div class="modal glass">
    <div class="modal-title">Edit Average Values</div>
    <div class="modal-subtitle">Player: <span id="average-player-name"></span></div>

    <div class="avg-inputs">
      <div class="avg-input-group">
        <label class="avg-input-label" for="modal-current-rate">CurrentRate</label>
        <input id="modal-current-rate" class="avg-input" type="text" inputmode="numeric" oninput="syncAverageModalPreview()">
      </div>
      <div class="avg-input-group">
        <label class="avg-input-label" for="modal-previous-1">Previous 1</label>
        <input id="modal-previous-1" class="avg-input" type="text" inputmode="numeric" oninput="syncAverageModalPreview()">
      </div>
      <div class="avg-input-group">
        <label class="avg-input-label" for="modal-previous-2">Previous 2</label>
        <input id="modal-previous-2" class="avg-input" type="text" inputmode="numeric" oninput="syncAverageModalPreview()">
      </div>
    </div>

    <div class="avg-label">Average: <span id="modal-average-value" class="avg-label-value">—</span></div>

    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeAveragePopup()">Cancel</button>
      <button class="btn btn-primary" onclick="saveAverageFromPopup()">Save</button>
    </div>
  </div>
</div>

</body>
</html>
