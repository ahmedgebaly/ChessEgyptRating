<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Egypt Rating</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
    h1 { text-align:center; }
    table { width:100%; border-collapse: collapse; margin-top:20px; }
    th, td { padding:10px; border-bottom:1px solid #334155; text-align:center; }
    button { padding:6px 10px; border:none; border-radius:6px; cursor:pointer; }
    .add { background:#22c55e; color:white; }
    .del { background:#ef4444; color:white; }
    .input-box { margin-top:20px; }
    input { padding:8px; margin:5px; border-radius:6px; border:none; }
    tbody tr:hover { background:#1e293b; }
    th { background:#1e40af; }
  </style>
</head>
<body>

<h1>🇪🇬 Chess Egypt Rating</h1>

<div class="input-box">
  <input id="name" placeholder="اسم اللاعب">
  <input id="rating" type="number" placeholder="FIDE Rating">
  <input id="rank" type="number" placeholder="African Rank">
  <button class="add" onclick="addPlayer()">إضافة لاعب</button>
</div>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>الاسم</th>
      <th>Rating</th>
      <th>African Rank</th>
      <th>Bonus</th>
      <th>Final Score</th>
      <th>+Bonus</th>
      <th>حذف</th>
    </tr>
  </thead>
  <tbody id="players"></tbody>
</table>

<script>
let players = [];

function calcScore(p) {
  return p.rating + p.bonus + (1000 - p.rank);
}

function render() {
  const tbody = document.getElementById("players");
  tbody.innerHTML = "";

  players.sort((a, b) => calcScore(b) - calcScore(a));

  players.forEach((p, i) => {
    tbody.innerHTML += `
      <tr>
        <td>${i + 1}</td>
        <td>${p.name}</td>
        <td>${p.rating}</td>
        <td>${p.rank}</td>
        <td>${p.bonus}</td>
        <td><strong>${calcScore(p)}</strong></td>
        <td><button onclick="addBonus(${p.id})">+10</button></td>
        <td><button class="del" onclick="deletePlayer(${p.id})">🗑</button></td>
      </tr>
    `;
  });
}

function addPlayer() {
  const name = document.getElementById("name").value.trim();
  const rating = +document.getElementById("rating").value;
  const rank = +document.getElementById("rank").value;

  if (!name) return alert("ادخل اسم اللاعب");
  if (!rating) return alert("ادخل الـ FIDE Rating");
  if (!rank) return alert("ادخل الـ African Rank");

  players.push({ id: Date.now(), name, rating, rank, bonus: 0 });

  document.getElementById("name").value = "";
  document.getElementById("rating").value = "";
  document.getElementById("rank").value = "";

  render();
}

function addBonus(id) {
  const p = players.find(p => p.id === id);
  if (p) p.bonus += 10;
  render();
}

function deletePlayer(id) {
  players = players.filter(p => p.id !== id);
  render();
}
</script>

</body>
</html>
