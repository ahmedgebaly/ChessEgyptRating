<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Egypt Rating</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
    h1 { text-align:center; }
    table { width:100%; border-collapse: collapse; margin-top:20px; }
    th, td { padding:10px; border-bottom:1px solid #334155; text-align:center; }
    button { padding:6px 10px; border:none; border-radius:6px; cursor:pointer; }
    .add { background:#22c55e; }
    .input-box { margin-top:20px; }
    input { padding:8px; margin:5px; border-radius:6px; border:none; }
    .mini-footer {
      margin-top: 14px;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.72);
    }
  </style>
</head>
<body>

<h1>🇪🇬 Chess Egypt Rating</h1>

<div class="input-box">
  <input id="name" placeholder="اسم اللاعب">
  <input id="rating" type="number" placeholder="FIDE Rating">
  <input id="rank" type="number" placeholder="African Rank">
  <button class="add" onclick="addPlayer()">إضافة لاعب</button>
</div>

<table>
  <thead>
    <tr>
      <th>الاسم</th>
      <th>Rating</th>
      <th>African Rank</th>
      <th>Bonus</th>
      <th>Final Score</th>
      <th>+</th>
    </tr>
  </thead>
  <tbody id="players"></tbody>
</table>

<script>
let players = [];

function calcScore(p){
  return p.rating + p.bonus + (1000 - p.rank);
}

function render(){
  const tbody = document.getElementById("players");
  tbody.innerHTML = "";

  players.sort((a,b)=> calcScore(b) - calcScore(a));

  players.forEach((p,i)=>{
    tbody.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.rating}</td>
        <td>${p.rank}</td>
        <td>${p.bonus}</td>
        <td>${calcScore(p)}</td>
        <td><button onclick="addBonus(${i})">+10</button></td>
      </tr>
    `;
  });
}

function addPlayer(){
  const name = document.getElementById("name").value;
  const rating = +document.getElementById("rating").value;
  const rank = +document.getElementById("rank").value;

  if(!name) return alert("ادخل اسم اللاعب");

  players.push({ name, rating, rank, bonus:0 });
  render();
}

function addBonus(index){
  players[index].bonus += 10;
  render();
}
</script>

<footer class="mini-footer">Powered by: Zeyad Khalifa & Ahmed El Gebaly</footer>

</body>
</html>
