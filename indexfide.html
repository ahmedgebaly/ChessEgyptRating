<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Egypt Rating</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial; background: #0f172a; color: white; padding: 20px; }
    h1 { text-align: center; margin: 20px 0 30px; }

    .search-box {
      display: flex; gap: 10px; flex-wrap: wrap;
      justify-content: center; margin-bottom: 20px;
    }
    .search-box input {
      padding: 10px 16px; border-radius: 8px;
      border: 2px solid #334155; background: #1e293b;
      color: white; font-size: 1rem; width: 200px;
    }
    .search-box input:focus { outline: none; border-color: #3b82f6; }
    .search-btn {
      padding: 10px 20px; border: none; border-radius: 8px;
      background: #3b82f6; color: white; font-size: 1rem; cursor: pointer;
    }
    .search-btn:hover { background: #2563eb; }

    #preview { max-width: 500px; margin: 0 auto 24px; }

    .card {
      background: #1e293b; border-radius: 12px;
      padding: 20px; border: 1px solid #334155;
    }
    .card-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 16px; padding-bottom: 14px;
      border-bottom: 1px solid #334155;
    }
    .avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: #1e40af; display: flex;
      align-items: center; justify-content: center; font-size: 1.5rem;
    }
    .player-name { font-size: 1.1rem; font-weight: bold; }
    .player-title {
      display: inline-block; background: #f59e0b;
      color: #000; padding: 2px 8px; border-radius: 4px;
      font-size: 0.75rem; font-weight: bold; margin-top: 4px;
    }
    .info-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .info-item {
      background: #0f172a; border-radius: 8px;
      padding: 10px; text-align: center;
    }
    .info-label { font-size: 0.7rem; color: #94a3b8; margin-bottom: 4px; }
    .info-value { font-size: 1.05rem; font-weight: bold; color: #38bdf8; }
    .info-value.none { color: #64748b; font-size: 0.85rem; }

    .add-section { margin-top: 16px; }
    .add-btn {
      padding: 10px; border: none; border-radius: 8px;
      background: #22c55e; color: white; cursor: pointer;
      font-size: 0.95rem; width: 100%;
    }
    .add-btn:hover { background: #16a34a; }

    #debug {
      max-width: 500px; margin: 0 auto 12px;
      background: #1e293b; border-radius: 8px; padding: 8px 14px;
      font-size: 0.75rem; color: #94a3b8; display: none;
    }

    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    th { background: #1e40af; padding: 10px; font-size: 0.85rem; }
    td { padding: 9px; border-bottom: 1px solid #334155; text-align: center; font-size: 0.85rem; }
    tbody tr:hover { background: #1e293b; }

    .bonus-btn { padding: 4px 10px; border: none; border-radius: 6px; background: #3b82f6; color: white; cursor: pointer; }
    .del-btn   { padding: 4px 10px; border: none; border-radius: 6px; background: #ef4444; color: white; cursor: pointer; }
    .fide-link { color: #38bdf8; text-decoration: none; }
    .fide-link:hover { text-decoration: underline; }

    .loading { text-align: center; color: #94a3b8; padding: 20px; }
    .error   { color: #ef4444; text-align: center; padding: 16px; font-size: 0.9rem; line-height: 1.8; }

    .gold   { color: #fbbf24; font-weight: bold; }
    .silver { color: #94a3b8; font-weight: bold; }
    .bronze { color: #b45309; font-weight: bold; }
  </style>
</head>
<body>

<h1>🇪🇬 Chess Egypt Rating</h1>

<div class="search-box">
  <input id="fideid" type="number" placeholder="FIDE ID"
    onkeydown="if(event.key==='Enter') lookupPlayer()">
  <button class="search-btn" onclick="lookupPlayer()">🔍 بحث</button>
</div>

<div id="debug"></div>
<div id="preview"></div>

<table>
  <thead>
    <tr>
      <th>#</th>
      <th>الاسم</th>
      <th>Federation</th>
      <th>Classical</th>
      <th>Rapid</th>
      <th>Blitz</th>
      <th>African Rank</th>
      <th>National Rank</th>
      <th>Bonus</th>
      <th>Final Score</th>
      <th>+Bonus</th>
      <th>حذف</th>
    </tr>
  </thead>
  <tbody id="players"></tbody>
</table>

<script>
let players      = [];
let currentPlayer = null;

// ✅ الـ endpoint الصح
const API = id =>
  `https://fide-api.vercel.app/player_info/?fide_id=${id}&history=false`;

// CORS Proxies
const wrap = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
];

function setDebug(msg, hide = false) {
  const el = document.getElementById("debug");
  if (hide) { el.style.display = "none"; return; }
  el.style.display = "block";
  el.textContent = "🛠 " + msg;
}

async function safeFetch(url) {
  // Direct
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
    if (r.ok) { setDebug("✅ Direct"); return { json: await r.json(), ok: true }; }
  } catch (_) {}

  // Proxies
  for (const make of wrap) {
    try {
      setDebug("جاري المحاولة عبر proxy...");
      const r = await fetch(make(url), { signal: AbortSignal.timeout(9000) });
      if (!r.ok) continue;
      let data = await r.json();
      if (data.contents) data = JSON.parse(data.contents); // allorigins
      setDebug("✅ proxy نجح");
      return { json: data, ok: true };
    } catch (_) {}
  }
  return { ok: false };
}

function calcScore(p) {
  return (p.classical || 0) + (p.bonus || 0);
}

function rankClass(i) {
  return i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
}

function render() {
  players.sort((a, b) => calcScore(b) - calcScore(a));
  const tbody = document.getElementById("players");
  tbody.innerHTML = "";
  players.forEach((p, i) => {
    const cls   = rankClass(i);
    const medal = ['🥇','🥈','🥉'][i] ?? (i + 1);
    const badge = p.title
      ? `<span style="background:#f59e0b;color:#000;padding:1px 5px;border-radius:3px;font-size:0.7rem;margin-right:4px">${p.title}</span>`
      : '';
    tbody.innerHTML += `
      <tr>
        <td class="${cls}">${medal}</td>
        <td><a class="fide-link" href="https://ratings.fide.com/profile/${p.fideId}" target="_blank">${badge}${p.name}</a></td>
        <td>${p.federation ?? '-'}</td>
        <td class="${cls}">${p.classical   ?? '<span style="color:#64748b">-</span>'}</td>
        <td>${p.rapid      ?? '<span style="color:#64748b">-</span>'}</td>
        <td>${p.blitz      ?? '<span style="color:#64748b">-</span>'}</td>
        <td>${p.africanRank   ?? '<span style="color:#64748b">-</span>'}</td>
        <td>${p.nationalRank  ?? '<span style="color:#64748b">-</span>'}</td>
        <td>${p.bonus}</td>
        <td><strong class="${cls}">${calcScore(p)}</strong></td>
        <td><button class="bonus-btn" onclick="addBonus(${p.uid})">+10</button></td>
        <td><button class="del-btn"   onclick="deletePlayer(${p.uid})">🗑</button></td>
      </tr>`;
  });
}

async function lookupPlayer() {
  const id = document.getElementById("fideid").value.trim();
  if (!id) return alert("ادخل FIDE ID");

  const preview = document.getElementById("preview");
  preview.innerHTML = `<div class="loading">⏳ جاري جلب بيانات اللاعب...</div>`;
  setDebug("جاري الاتصال...");
  currentPlayer = null;

  const { json: d, ok } = await safeFetch(API(id));

  if (!ok || !d) {
    preview.innerHTML = `<div class="error">
      ❌ فشل الاتصال<br>
      <small>تأكد من الـ FIDE ID أو افتح F12 → Console لمزيد من التفاصيل</small>
    </div>`;
    return;
  }

  currentPlayer = {
    uid:         Date.now(),
    fideId:      d.fide_id,
    name:        d.name             ?? 'Unknown',
    title:       (d.fide_title && d.fide_title !== 'None') ? d.fide_title : null,
    federation:  d.federation       ?? '-',
    birth_year:  d.birth_year       ?? '-',
    sex:         d.sex              ?? '-',
    classical:   d.classical_rating ?? null,
    rapid:       d.rapid_rating     ?? null,
    blitz:       d.blitz_rating     ?? null,
    worldRank:   d.world_rank_active        ?? null,
    africanRank: d.continental_rank_active  ?? null,
    nationalRank: d.national_rank_active    ?? null,
    bonus:       0
  };

  function box(label, val) {
    return `<div class="info-item">
      <div class="info-label">${label}</div>
      <div class="info-value ${val != null ? '' : 'none'}">${val ?? '-'}</div>
    </div>`;
  }

  preview.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="avatar">♟️</div>
        <div>
          <div class="player-name">${currentPlayer.name}</div>
          ${currentPlayer.title ? `<span class="player-title">${currentPlayer.title}</span>` : ''}
          <div style="font-size:0.75rem;color:#94a3b8;margin-top:4px">
            ${currentPlayer.federation} · Born ${currentPlayer.birth_year} · ${currentPlayer.sex}
          </div>
        </div>
      </div>
      <div class="info-grid">
        ${box('⚡ Classical',     currentPlayer.classical)}
        ${box('🚀 Rapid',         currentPlayer.rapid)}
        ${box('🔥 Blitz',         currentPlayer.blitz)}
        ${box('🌍 World Rank',    currentPlayer.worldRank)}
        ${box('🌍 African Rank',  currentPlayer.africanRank)}
        ${box('🇪🇬 National Rank', currentPlayer.nationalRank)}
      </div>
      <div class="add-section">
        <button class="add-btn" onclick="addToTable()">➕ أضف للجدول</button>
      </div>
    </div>`;
}

function addToTable() {
  if (!currentPlayer) return;
  if (players.find(p => p.fideId === currentPlayer.fideId))
    return alert("اللاعب موجود بالفعل في الجدول!");
  players.push({ ...currentPlayer, uid: Date.now() });
  document.getElementById("preview").innerHTML = "";
  document.getElementById("fideid").value = "";
  setDebug("", true);
  render();
}

function addBonus(uid) {
  const p = players.find(p => p.uid === uid);
  if (p) { p.bonus += 10; render(); }
}

function deletePlayer(uid) {
  players = players.filter(p => p.uid !== uid);
  render();
}
</script>

</body>
</html>
